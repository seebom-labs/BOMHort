apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api-gateway
  labels:
    app.kubernetes.io/name: bomhort
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: bomhort
      app.kubernetes.io/component: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bomhort
        app.kubernetes.io/component: api-gateway
        {{- if not .Values.gitSync.enabled }}
        bomhort.io/sbom-volume: "true"
        {{- end }}
    spec:
      {{- if not .Values.gitSync.enabled }}
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: bomhort.io/sbom-volume
                    operator: Exists
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: api-gateway
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/api-gateway:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.apiGateway.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret
          {{- if or .Values.clickhouse.userPasswordSecret.enabled .Values.s3.credentialsSecret.enabled .Values.apiGateway.auth.enabled }}
          env:
            {{- if .Values.clickhouse.userPasswordSecret.enabled }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.userPasswordSecret.secretName }}
                  key: {{ .Values.clickhouse.userPasswordSecret.key }}
            {{- end }}
            {{- if .Values.s3.credentialsSecret.enabled }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.credentialsSecret.secretName }}
                  key: {{ .Values.s3.credentialsSecret.accessKeyKey }}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.credentialsSecret.secretName }}
                  key: {{ .Values.s3.credentialsSecret.secretKeyKey }}
            {{- end }}
            {{- if .Values.apiGateway.auth.enabled }}
            - name: AUTH_ENABLED
              value: "true"
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  {{- if .Values.apiGateway.auth.existingSecret.enabled }}
                  name: {{ .Values.apiGateway.auth.existingSecret.secretName }}
                  key: {{ .Values.apiGateway.auth.existingSecret.serviceTokenKey }}
                  {{- else }}
                  name: {{ .Release.Name }}-api-auth
                  key: SERVICE_TOKEN
                  {{- end }}
                  optional: true
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  {{- if .Values.apiGateway.auth.existingSecret.enabled }}
                  name: {{ .Values.apiGateway.auth.existingSecret.secretName }}
                  key: {{ .Values.apiGateway.auth.existingSecret.apiKeysKey }}
                  {{- else }}
                  name: {{ .Release.Name }}-api-auth
                  key: API_KEYS
                  {{- end }}
                  optional: true
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          volumeMounts:
            - name: sbom-data
              mountPath: {{ .Values.sbomSource.mountPath }}
              readOnly: true
            {{- if .Values.licenseExceptions.enabled }}
            - name: license-exceptions
              mountPath: {{ .Values.licenseExceptions.mountPath }}
              subPath: license-exceptions.json
              readOnly: true
            {{- end }}
            {{- if .Values.licensePolicy.enabled }}
            - name: license-policy
              mountPath: {{ .Values.licensePolicy.mountPath }}
              subPath: license-policy.json
              readOnly: true
            {{- end }}
      volumes:
        - name: sbom-data
          {{- if .Values.gitSync.enabled }}
          emptyDir: {}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ .Values.sbomSource.pvcName }}
          {{- end }}
        {{- if .Values.licenseExceptions.enabled }}
        - name: license-exceptions
          configMap:
            name: {{ .Release.Name }}-license-exceptions
        {{- end }}
        {{- if .Values.licensePolicy.enabled }}
        - name: license-policy
          configMap:
            name: {{ .Release.Name }}-license-policy
        {{- end }}

