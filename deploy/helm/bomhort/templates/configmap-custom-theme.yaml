{{- if and .Values.ui.enabled .Values.ui.customTheme.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-custom-theme
  labels:
    app.kubernetes.io/name: bomhort
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  custom-theme.css: |-
    /* BOMHort Custom Theme – edit this ConfigMap to rebrand the UI */
    /* Run: kubectl edit configmap {{ .Release.Name }}-custom-theme */
    /* Then: kubectl rollout restart deployment {{ .Release.Name }}-ui */
{{- end }}

