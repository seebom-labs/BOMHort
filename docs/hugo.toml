baseURL = "https://docs.bomhort.dev/"
title = "BOMHort Documentation"
languageCode = "en-us"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

# Hugo modules – Docsy theme
[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.140.0"
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
    disable = false

# Ignore the original markdown files in docs/ root (they are preserved as-is)
ignoreFiles = ["^[A-Z_]+\\.md$"]

enableRobotsTXT = false  # Using static/robots.txt instead (includes Sitemap directive)
enableGitInfo = false

# SEO: Generate sitemap
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

# Taxonomy
[taxonomies]
  tag = "tags"
  category = "categories"

# Highlighting
[markup]
  [markup.goldmark]
    [markup.goldmark.parser.attribute]
      block = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

# Top navbar – kept intentionally lean. The full documentation section tree
# (Getting Started, Architecture, Deployment, Development, Release, …) lives in
# the left sidebar, which is generated from the content tree, not from this
# menu. Keeping only a few high-level links here avoids the cramped horizontal
# scroll state on medium widths and keeps the mobile navbar clean.
[menu]
  [[menu.main]]
    name = "Docs"
    weight = 10
    url = "/docs/"
    identifier = "docs"
  [[menu.main]]
    name = "Roadmap"
    weight = 20
    url = "/docs/roadmap/"
    identifier = "roadmap"
  [[menu.main]]
    name = "FAQ"
    weight = 30
    url = "/docs/faq/"
    identifier = "faq"
  [[menu.main]]
    name = "GitHub"
    weight = 90
    url = "https://github.com/seebom-labs/BOMHort"
    pre = "<i class='fab fa-github'></i>"
    identifier = "github"

# Docsy parameters
[params]
  description = "BOMHort is a Kubernetes-native SBOM visualization and governance platform. Ingest SPDX SBOMs, detect vulnerabilities via OSV, enforce license compliance, and apply VEX statements."
  github_repo = "https://github.com/seebom-labs/BOMHort"
  github_project_repo = "https://github.com/seebom-labs/BOMHort"
  github_branch = "main"
  # SEO
  images = ["images/og-image.png"]
  offlineSearch = false

  [params.ui]
    sidebar_menu_compact = true
    sidebar_menu_foldable = true
    sidebar_search_disable = false
    navbar_logo = true
    navbar_translucent_over_cover_disable = true
    # NO theme toggle
    showLightDarkModeMenu = false
    # Show 3 levels in sidebar
    ul_show = 3
    [params.ui.readingtime]
      enable = false

  [params.links]
    [[params.links.developer]]
      name = "GitHub"
      url = "https://github.com/seebom-labs/BOMHort"
      icon = "fab fa-github"
      desc = "Source code and issue tracker"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

