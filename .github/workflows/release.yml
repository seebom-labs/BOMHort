name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write       # For cosign keyless signing & provenance attestation
  attestations: write   # For GitHub artifact attestations

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - name: ingestion-watcher
            context: backend
            target: ingestion-watcher
          - name: parsing-worker
            context: backend
            target: parsing-worker
          - name: api-gateway
            context: backend
            target: api-gateway
          - name: cve-refresher
            context: backend
            target: cve-refresher
          - name: ui
            context: ui
            target: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e362a7a4b04 # v6.18.0
        with:
          context: ${{ matrix.component.context }}
          target: ${{ matrix.component.target || '' }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component.name }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Sign container image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component.name }}@${DIGEST}"

      - name: Attest provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  helm:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" deploy/helm/seebom/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" deploy/helm/seebom/Chart.yaml

      - name: Package chart
        run: helm package deploy/helm/seebom/

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push chart
        run: helm push seebom-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ env.REPO }}/charts

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [images, helm]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.18.0
        with:
          path: .
          format: spdx-json
          output-file: seebom-${{ steps.version.outputs.version }}.spdx.json
          artifact-name: seebom-sbom

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: SeeBOM ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            seebom-${{ steps.version.outputs.version }}.spdx.json
          body: |
            ## Container Images

            All images are signed with [cosign](https://github.com/sigstore/cosign) (keyless) and attested with SLSA provenance.

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/api-gateway:${{ steps.version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/parsing-worker:${{ steps.version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/ingestion-watcher:${{ steps.version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/cve-refresher:${{ steps.version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/ui:${{ steps.version.outputs.version }}
            ```

            Verify signatures:
            ```bash
            cosign verify --certificate-identity-regexp="https://github.com/seebom-labs/seebom" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              ${{ env.REGISTRY }}/${{ env.REPO }}/api-gateway:${{ steps.version.outputs.version }}
            ```

            ## Helm Chart

            ```bash
            helm install seebom oci://${{ env.REGISTRY }}/${{ env.REPO }}/charts/seebom --version ${{ steps.version.outputs.version }}
            ```

            ## SBOM

            An SPDX SBOM for this release is attached as `seebom-${{ steps.version.outputs.version }}.spdx.json`.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
