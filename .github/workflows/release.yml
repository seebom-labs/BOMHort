name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write       # For cosign keyless signing & provenance attestation
      attestations: write   # For GitHub artifact attestations
    strategy:
      matrix:
        component:
          - name: ingestion-watcher
            context: backend
            target: ingestion-watcher
          - name: parsing-worker
            context: backend
            target: parsing-worker
          - name: api-gateway
            context: backend
            target: api-gateway
          - name: cve-refresher
            context: backend
            target: cve-refresher
          - name: ui
            context: ui
            target: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.component.context }}
          target: ${{ matrix.component.target || '' }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component.name }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign container image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component.name }}@${DIGEST}"

      - name: Attest provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  helm:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    needs: images
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" deploy/helm/seebom/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" deploy/helm/seebom/Chart.yaml

      - name: Package chart
        run: helm package deploy/helm/seebom/

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push chart
        run: helm push seebom-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ env.REPO }}/charts

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [images, helm]
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.18.0
        with:
          path: .
          format: spdx-json
          output-file: seebom-${{ steps.version.outputs.version }}.spdx.json
          artifact-name: seebom-sbom

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifacts
        run: |
          cosign sign-blob --yes \
            --bundle seebom-${{ steps.version.outputs.version }}.spdx.json.bundle \
            seebom-${{ steps.version.outputs.version }}.spdx.json

      - name: Attest SBOM provenance
        id: provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: seebom-${{ steps.version.outputs.version }}.spdx.json

      - name: Rename provenance bundle
        run: |
          cp "${{ steps.provenance.outputs.bundle-path }}" seebom-${{ steps.version.outputs.version }}.spdx.json.intoto.jsonl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: SeeBOM ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            seebom-${{ steps.version.outputs.version }}.spdx.json
            seebom-${{ steps.version.outputs.version }}.spdx.json.bundle
            seebom-${{ steps.version.outputs.version }}.spdx.json.intoto.jsonl
          body: |
            ## Container Images

            All images are signed with [cosign](https://github.com/sigstore/cosign) (keyless) and attested with SLSA provenance.

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/api-gateway:${{ steps.version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/parsing-worker:${{ steps.version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/ingestion-watcher:${{ steps.version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/cve-refresher:${{ steps.version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/ui:${{ steps.version.outputs.version }}
            ```

            Verify signatures:
            ```bash
            cosign verify --certificate-identity-regexp="https://github.com/seebom-labs/seebom" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              ${{ env.REGISTRY }}/${{ env.REPO }}/api-gateway:${{ steps.version.outputs.version }}
            ```

            ## Helm Chart

            ```bash
            helm install seebom oci://${{ env.REGISTRY }}/${{ env.REPO }}/charts/seebom --version ${{ steps.version.outputs.version }}
            ```

            ## SBOM

            An SPDX SBOM for this release is attached as `seebom-${{ steps.version.outputs.version }}.spdx.json`.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
