name: Pre-Release (manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0-rc1)'
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        component:
          - name: ingestion-watcher
            context: backend
            target: ingestion-watcher
          - name: parsing-worker
            context: backend
            target: parsing-worker
          - name: api-gateway
            context: backend
            target: api-gateway
          - name: cve-refresher
            context: backend
            target: cve-refresher
          - name: ui
            context: ui
            target: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.component.context }}
          target: ${{ matrix.component.target || '' }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component.name }}:${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create Pre-Release
    runs-on: ubuntu-latest
    needs: images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v2.3.2
        with:
          tag_name: v${{ inputs.version }}
          name: BOMHort ${{ inputs.version }}
          generate_release_notes: true
          body: |
            > ⚠️ **Pre-release** — built from branch `${{ github.ref_name }}`

            ## Container Images

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/api-gateway:${{ inputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/parsing-worker:${{ inputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/ingestion-watcher:${{ inputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/cve-refresher:${{ inputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/ui:${{ inputs.version }}
            ```
          draft: false
          prerelease: true

