# Deploy Hugo docs site to GitHub Pages
# Triggered on push to main (docs/ changes) or manually
name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.158.0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Hugo
        env:
          # SHA256 checksum for hugo_extended_0.158.0_linux-amd64.deb
          HUGO_SHA256: "b63b49c2961f6f9f761368f790c34f26b62c4b17dc915f014db6885f7cd5681f"
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          echo "${HUGO_SHA256}  ${{ runner.temp }}/hugo.deb" | sha256sum --check --status
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Go (for Hugo modules)
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.11'
          cache-dependency-path: docs/go.sum

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install PostCSS dependencies
        working-directory: docs
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build Hugo site
        working-directory: docs
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: UTC
        run: |
          # NOTE: We intentionally do NOT pass --baseURL here. The Hugo
          # `baseURL` in docs/hugo.toml is the canonical HTTPS custom domain
          # (https://docs.bomhort.dev/). The `actions/configure-pages` output
          # `base_url` resolves the custom domain with an *http://* scheme,
          # which would poison every canonical link, og:url, and sitemap <loc>
          # with http:// — causing Google to treat the pages as redirect/
          # duplicate targets and skip indexing. Relying on hugo.toml keeps all
          # SEO URLs on https://.
          hugo \
            --gc \
            --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
