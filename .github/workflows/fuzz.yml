name: ClusterFuzzLite (Fuzzing)

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
  schedule:
    - cron: '0 4 * * 6'  # Weekly on Saturday at 4 AM UTC

permissions:
  contents: read

jobs:
  fuzz:
    name: Go Fuzz Tests
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod

      - name: Run SPDX parser fuzz test
        run: go test ./internal/spdx/ -fuzz=FuzzParse -fuzztime=60s

      - name: Run VEX parser fuzz test
        run: go test ./internal/vex/ -fuzz=FuzzParse -fuzztime=60s


